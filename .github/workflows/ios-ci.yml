name: iOS CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Lumo
        run: |
          xcodebuild \
            -project Lumo/Lumo.xcodeproj \
            -scheme Lumo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            build
