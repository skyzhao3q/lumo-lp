name: Site CI

on:
  push:
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run verify:routes
